plaid:
  client-id: ${PLAID_CLIENT_ID}
  secret: ${PLAID_SECRET}
  env: ${PLAID_ENV:sandbox}
  webhook-secret: ${PLAID_WEBHOOK_SECRET:changeme-webhook-secret}

encryption:
  key: ${ENCRYPTION_KEY:1234567890123456}

jwt:
  secret: ${JWT_SECRET}
  expirationMs: 86400000
  cookieName: ai_finance_jwt

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
  base-url: https://api.openai.com/v1
  max-tokens: 800
  temperature: 0.3

spring:
  application:
    name: financial-intelligence-api
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8090}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none   # Schema managed by DatabaseMigrationRunner
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    com.example.financial: DEBUG
    org.springframework.security: DEBUG

# ── AutoPay Hub ──────────────────────────────────────────────────────────────
autopay:
  reminder:
    cron: ${AUTOPAY_REMINDER_CRON:0 0 8 * * ?}
  plaid-verification:
    # Cron: nightly at 2 AM — scan execution logs for Plaid verification
    cron: ${AUTOPAY_VERIFICATION_CRON:0 0 2 * * ?}
    # Days after execution before flagging as NEEDS_REVIEW if unverified
    review-threshold-days: 5

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  off-session: true

# ── Resilience4j (rate limiting) ──────────────────────────────────────────────
resilience4j:
  ratelimiter:
    instances:
      stripe-write:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 0s
