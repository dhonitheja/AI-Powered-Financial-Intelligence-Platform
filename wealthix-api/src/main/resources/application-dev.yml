plaid:
  client-id: ${PLAID_CLIENT_ID}
  secret: ${PLAID_SECRET}
  env: ${PLAID_ENV:sandbox}
  products: transactions
  country-codes: US,CA
  webhook-url: ${PLAID_WEBHOOK_URL:}
  webhook-secret: ${PLAID_WEBHOOK_SECRET:}

spring:
  datasource:
    url: ${DATABASE_URL}
    driverClassName: ${DATABASE_DRIVER:org.postgresql.Driver}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      data-source-properties:
        ssl: true
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

wealthix:
  ai:
    service:
      url: ${AI_SERVICE_URL:http://localhost:8000}
      secret: ${INTERNAL_AI_SERVICE_SECRET:dev_internal_secret_key_123}
