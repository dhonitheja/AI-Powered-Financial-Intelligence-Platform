plaid:
  client-id: ${PLAID_CLIENT_ID}
  secret: ${PLAID_SECRET}
  env: ${PLAID_ENV:sandbox}
  products: transactions
  country-codes: US,CA
  webhook-url: ${PLAID_WEBHOOK_URL:}
  webhook-secret: ${PLAID_WEBHOOK_SECRET:}

spring:
  datasource:
    url: jdbc:h2:mem:financialdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

wealthix:
  ai:
    service:
      url: ${AI_SERVICE_URL:http://localhost:8000}
      secret: ${INTERNAL_AI_SERVICE_SECRET:dev_internal_secret_key_123}
