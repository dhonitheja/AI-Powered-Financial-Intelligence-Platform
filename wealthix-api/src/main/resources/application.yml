plaid:
  client-id: ${PLAID_CLIENT_ID}
  secret: ${PLAID_SECRET}
  env: ${PLAID_ENV:sandbox}
  webhook-secret: ${PLAID_WEBHOOK_SECRET:changeme-webhook-secret}
  products: ${PLAID_PRODUCTS:transactions,auth,identity,balance}
  country-codes: ${PLAID_COUNTRY_CODES:US,CA,GB}
  language: en
  webhook-url: ${PLAID_WEBHOOK_URL:}
  transaction-days: 30

encryption:
  key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

wealthix:
  ai:
    service:
      url: ${AI_SERVICE_URL:http://localhost:8000}
      secret: ${INTERNAL_AI_SERVICE_SECRET:dev_internal_secret_key_123}

jwt:
  secret: ${JWT_SECRET}
  expirationMs: 86400000
  cookieName: ai_finance_jwt

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o-mini
  base-url: https://api.openai.com/v1
  max-tokens: 800
  temperature: 0.3

spring:
  application:
    name: wealthix-api



  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:h2:mem:financialdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: 

  jpa:
    hibernate:
      ddl-auto: update   # Allow Hibernate to manage schema in H2 for local dev
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    com.wealthix: DEBUG
    org.springframework.security: DEBUG

# ── AutoPay Hub ──────────────────────────────────────────────────────────────
autopay:
  reminder:
    cron: ${AUTOPAY_REMINDER_CRON:0 0 8 * * ?}
  plaid-verification:
    # Cron: nightly at 2 AM — scan execution logs for Plaid verification
    cron: ${AUTOPAY_VERIFICATION_CRON:0 0 2 * * ?}
    # Days after execution before flagging as NEEDS_REVIEW if unverified
    review-threshold-days: 5

# ── Stripe ────────────────────────────────────────────────────────────────────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  off-session: true

# ── Resilience4j (rate limiting) ──────────────────────────────────────────────
resilience4j:
  ratelimiter:
    instances:
      stripe-write:
        limit-for-period: 10
        limit-refresh-period: 60s
        timeout-duration: 0s
      ai-chat:
        limit-for-period: 30
        limit-refresh-period: 1m
        timeout-duration: 0s
      plaid-sync:
        limit-for-period: 30
        limit-refresh-period: 1m
        timeout-duration: 0s
      autopay-write:
        limit-for-period: 30
        limit-refresh-period: 1m
        timeout-duration: 0s

# ── Observability (Actuator & Prometheus) ────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: wealthix-api

info:
  app:
    name: Wealthix API
    version: "@project.version@"
    description: AI-Powered Financial Intelligence Platform

# ── Performance ──────────────────────────────────────────────────────────────
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      pool-name: WealthixPool

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m
