<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Spending Anomaly Detected</title>
</head>

<body style="font-family: Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px;">
    <div
        style="max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #f59e0b; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
        <h2 style="color: #d97706;" th:text="${title}">AI Anomaly Detection</h2>
        <p style="color: #334155;">We noticed unusual spending patterns in your recent transactions.</p>

        <div style="background-color: #fef3c7; padding: 15px; border-radius: 6px; margin: 20px 0;">
            <p><strong>Category:</strong> <span th:text="${category}">Category Name</span></p>
            <p><strong>Amount MTD:</strong> $<span th:text="${amount}">0.00</span></p>
            <p><strong>AI Recommendation:</strong> <span th:text="${recommendation}">Recommendation details</span></p>
        </div>

        <p style="font-size: 14px; color: #64748b;">Review your spending in the dashboard to ensure everything is on
            track.</p>
    </div>
</body>

</html>
