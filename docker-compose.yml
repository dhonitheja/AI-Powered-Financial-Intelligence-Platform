version: "3.9"

services:

  wealthix-api:
    build:
      context: ./wealthix-api
      dockerfile: Dockerfile
    container_name: wealthix-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_DRIVER=${DATABASE_DRIVER:-org.postgresql.Driver}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=${PLAID_ENV}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - INTERNAL_AI_SERVICE_SECRET=${INTERNAL_AI_SERVICE_SECRET}
      - AI_SERVICE_URL=http://wealthix-ai:8000
      - GMAIL_USERNAME=${GMAIL_USERNAME}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
    depends_on:
      wealthix-ai:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wealthix-internal

  wealthix-ai:
    build:
      context: ./financial-ai-service
      dockerfile: Dockerfile
    container_name: wealthix-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Map local gcloud credentials for Vertex AI SDK authentication
      - ~/.config/gcloud:/home/wealthix/.config/gcloud
    environment:
      - INTERNAL_SERVICE_SECRET=${INTERNAL_AI_SERVICE_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_CLOUD_PROJECT=wealthix-pro
    networks:
      - wealthix-internal

  wealthix-ui:
    build:
      context: ./wealthix-ui
      dockerfile: Dockerfile
    container_name: wealthix-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_PLAID_ENV=${PLAID_ENV}
      - BACKEND_URL=http://wealthix-api:8080
    depends_on:
      wealthix-api:
        condition: service_healthy
    networks:
      - wealthix-internal

networks:
  wealthix-internal:
    driver: bridge
